  # url: postgres://user:password@localhost:5432/mydb?sslmode=disable

  # Option 2: Using separate fields (required if URL is not provided)
  host: localhost
  port: 5432
  username: shopnexus
  password: peakshopnexuspassword
  database: shopnexus
  maxConnections: 50
  maxIdleConnections: 10
  maxConnIdleTime: 300
  logQuery: true
  allowNestedTransactions: true

redis:
  host: localhost
  port: "6379"
  password: "peaksehopnexuspassword"
  db: 0

nats:
