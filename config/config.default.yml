env: dev

log:
  level: debug
  format: json
  addSource: true
  timeFormat: "2006-01-02 15:04:05"

app:
  name: shopnexus
  publicUrl: "http://localhost:5004"
  jwt:
    secret: supersecretkey123
    accessTokenDuration: 3600
    refreshSecret: superrefreshsecret456
    refreshTokenDuration: 1209600
  vnpay:
    tmnCode: ""
    hashSecret: ""
    returnUrl: "http://localhost:3000/payment/vnpay_return"
  sepay:
    merchantId: ""
    secretKey: ""
    ipnSecretKey: ""
    successUrl: "http://localhost:3000/payment/sepay_return"
    errorUrl: "http://localhost:3000/payment/sepay_error"
    cancelUrl: "http://localhost:3000/payment/sepay_cancel"
