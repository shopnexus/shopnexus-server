root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/server.exe"
  cmd = "go build -o ./tmp/server.exe ./cmd/server"
  delay = 1000
  exclude_dir = [
    "assets",
    "tmp",
    "vendor",
    "testdata",
    "node_modules",
    "example",
    # Non-Go directories that don't affect the server build
    "volumes",
    "deployment",
    "docs",
    "seeder",
    ".vscode",
    ".claude",
  ]
  exclude_file = []
  exclude_regex = ["_test\\.go$"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = "GOLANG_PROTOBUF_REGISTRATION_CONFLICT=warn ./tmp/server.exe"
  include_dir = []
  include_ext = ["go", "yml", "yaml"]
  include_file = []
  kill_delay = "2s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  post_cmd = []
  pre_cmd = []
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  silent = false
  time = true

[misc]
  clean_on_exit = true

[proxy]
  app_port = 0
  enabled = false
  proxy_port = 0

[screen]
  clear_on_rebuild = true
  keep_scroll = true
