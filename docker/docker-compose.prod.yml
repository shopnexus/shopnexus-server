volumes:
  postgres-backup-data:
  postgres-data:
  redis-data:
  kafka-data:
  es-data:
  minio-data:
  milvus-data:
  etcd-data:
  server-data:

services:
  postgres:
    container_name: shopnexus-postgres-prod
    image: postgres:17-alpine
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: shopnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shopnexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - postgres-backup-data:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnexus -d shopnexus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    container_name: shopnexus-redis-prod
    image: redis:8-alpine
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  kafka:
    container_name: shopnexus-kafka-prod
    image: confluentinc/cp-kafka:latest
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "9092:9092"
    volumes:
      - kafka-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    environment:
      # Required in KRaft mode
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # Listener configuration
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Production: Disable auto topic creation for security
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 3
      # Production: Longer retention for production data
      KAFKA_LOG_RETENTION_HOURS: 720 # Keep logs for 30 days
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 3000 # Delay for consumer rebalancing in production
      CLUSTER_ID: "Mk3OEYBSD34fcwNTJENDM2Qk"
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  server:
    container_name: shopnexus-server-prod
    build:
      context: .. # Context from root of the project
      dockerfile: ./Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server-data:/data
    environment:
      - ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:50051/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
