apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose convert -f docker-compose.prod.yml
    kompose.version: 1.34.0 (cbf2835db)
  labels:
    io.kompose.service: server
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: server
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose convert -f docker-compose.prod.yml
        kompose.version: 1.34.0 (cbf2835db)
      labels:
        io.kompose.service: server
    spec:
      containers:
        - env:
            - name: ENV
              value: production
          image: server
          livenessProbe:
            exec:
              command:
                - wget
                - --no-verbose
                - --tries=1
                - --spider
                - http://localhost:50051/healthz
            failureThreshold: 5
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          name: shopnexus-server-prod
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: "4"
              memory: "4294967296"
            requests:
              cpu: "1"
              memory: "1073741824"
          volumeMounts:
            - mountPath: /data
              name: server-data
      restartPolicy: Always
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: server-data
