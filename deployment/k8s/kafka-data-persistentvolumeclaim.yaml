apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  labels:
    io.kompose.service: kafka-data
  name: kafka-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi # Increased from 100Mi to 10Gi for proper Kafka operation
  # Optional: specify storage class if you have specific requirements
  # storageClassName: standard
