networks:
  default:
    name: shopnexus-network-dev
    external: false

volumes:
  postgres-data:
    name: shopnexus-postgres-data-dev
  redis-data:
    name: shopnexus-redis-data-dev
  nats-data:
    name: shopnexus-nats-data-dev
  server-data:
    name: shopnexus-server-data-dev
  restate-data:
    name: shopnexus-restate-data-dev
  etcd-data:
    name: shopnexus-etcd-data-dev
  milvus-data:
    name: shopnexus-milvus-data-dev
  milvus-minio-data:
    name: shopnexus-milvus-minio-data-dev

x-restate-environment: &restate-common-env
  RESTATE_CLUSTER_NAME: "restate-cluster"
  RESTATE_LOG_FILTER: "restate=info"
  RESTATE_DEFAULT_REPLICATION: 2
  RESTATE_METADATA_CLIENT__ADDRESSES: '["http://restate-1:5122","http://restate-2:5122","http://restate-3:5122"]'
  RESTATE_WORKER__SNAPSHOTS__DESTINATION: "s3://restate/snapshots"
  RESTATE_WORKER__SNAPSHOTS__SNAPSHOT_INTERVAL_NUM_RECORDS: "1000"
  RESTATE_WORKER__SNAPSHOTS__AWS_REGION: "local"
  RESTATE_WORKER__SNAPSHOTS__AWS_ENDPOINT_URL: "http://minio:9000"
  RESTATE_WORKER__SNAPSHOTS__AWS_ALLOW_HTTP: true
  RESTATE_WORKER__SNAPSHOTS__AWS_ACCESS_KEY_ID: "minioadmin"
  RESTATE_WORKER__SNAPSHOTS__AWS_SECRET_ACCESS_KEY: "minioadmin"

x-restate-defaults: &restate-defaults
  image: docker.restate.dev/restatedev/restate:latest
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - restate-data:/restate-data
  restart: unless-stopped
  depends_on:
    minio:
      condition: service_started

services:
  postgres:
    container_name: shopnexus-postgres-dev
    image: postgres:18
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: shopnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peakshopnexuspassword}
      POSTGRES_DB: shopnexus
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnexus -d shopnexus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    container_name: shopnexus-redis-dev
    image: redis:8
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  nats:
    container_name: shopnexus-nats-dev
    image: nats:latest
    ports:
      - "127.0.0.1:4222:4222"
      - "127.0.0.1:8222:8222"
    command: ["--jetstream", "--store_dir", "/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "--quiet", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  restate-1:
    <<: *restate-defaults
    container_name: shopnexus-restate-1-dev
    ports:
      - "127.0.0.1:8080:8080" # Ingress
      - "127.0.0.1:9470:9070" # Admin
      - "127.0.0.1:5122:5122" # Node-to-node communication
    environment:
      <<: *restate-common-env
      RESTATE_NODE_NAME: restate-1
      RESTATE_FORCE_NODE_ID: 1
      RESTATE_ADVERTISED_ADDRESS: "http://restate-1:5122"
      RESTATE_AUTO_PROVISION: "true"

  restate-2:
    <<: *restate-defaults
    container_name: shopnexus-restate-2-dev
    ports:
      - "127.0.0.1:28080:8080"
      - "127.0.0.1:29070:9070"
      - "127.0.0.1:25122:5122"
    environment:
      <<: *restate-common-env
      RESTATE_NODE_NAME: restate-2
      RESTATE_FORCE_NODE_ID: 2
      RESTATE_ADVERTISED_ADDRESS: "http://restate-2:5122"
      RESTATE_AUTO_PROVISION: "false"

  restate-3:
    <<: *restate-defaults
    container_name: shopnexus-restate-3-dev
    ports:
      - "127.0.0.1:38080:8080"
      - "127.0.0.1:39070:9070"
      - "127.0.0.1:35122:5122"
    environment:
      <<: *restate-common-env
      RESTATE_NODE_NAME: restate-3
      RESTATE_FORCE_NODE_ID: 3
      RESTATE_ADVERTISED_ADDRESS: "http://restate-3:5122"
      RESTATE_AUTO_PROVISION: "false"

  minio:
    container_name: shopnexus-minio-dev
    image: quay.io/minio/minio
    entrypoint: "/bin/sh"
    command: "-c 'mkdir -p /data/restate && /usr/bin/minio server --quiet /data'"
    ports:
      - "127.0.0.1:9400:9000"
    restart: unless-stopped

  etcd:
    container_name: shopnexus-etcd-dev
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd-data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    container_name: shopnexus-milvus-minio-dev
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - milvus-minio-data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: shopnexus-milvus-dev
    image: milvusdb/milvus:v2.6.11
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      common.security.authorizationEnabled: "false"
      MQ_TYPE: woodpecker
    volumes:
      - milvus-data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9491:9091"
    depends_on:
      etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy

  attu:
    container_name: shopnexus-milvus-attu
    image: zilliz/attu:latest
    ports:
      - "127.0.0.1:5004:3000"
    environment:
      - MILVUS_URL=http://standalone:19530
    depends_on:
      - "milvus"
    restart: unless-stopped

