volumes:
  postgres-data:
  redis-data:
  nats-data:
  es-data:
  minio-data:
  milvus-data:
  etcd-data:
  server-data:

services:
  postgres:
    container_name: shopnexus-postgres-prod
    image: postgres:17-alpine
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_USER: shopnexus
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shopnexus
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopnexus -d shopnexus"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  redis:
    container_name: shopnexus-redis-prod
    image: redis:8-alpine
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  nats:
    container_name: shopnexus-nats-prod
    image: nats:latest
    # Production: Don't expose ports externally, only internal network access
    # ports:
    #   - "4222:4222"
    command: ["--jetstream", "--store_dir", "/data"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "nats-server", "--signal", "ldm"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  server:
    container_name: shopnexus-server-prod
    build:
      context: .. # Context from root of the project
      dockerfile: ./Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      nats:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - server-data:/data
    environment:
      - ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:50051/healthz",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: always
    # Production: Add resource limits
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 1G
