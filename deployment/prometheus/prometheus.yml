# Prometheus config for ShopNexus server.
# Scrapes the Go server's /metrics endpoint every 15s.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: shopnexus-dev

scrape_configs:
  # Server metrics — the Go backend exposes /metrics on its HTTP port.
  # In dev, server runs on the host (make dev) at port 50051; we reach it via
  # host.docker.internal (added to /etc/hosts via extra_hosts in compose).
  - job_name: shopnexus-server
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:50051
        labels:
          service: shopnexus-server
          env: dev

  # Scrape Prometheus itself for self-monitoring
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
